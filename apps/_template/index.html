<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>应用模板</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1><i class="fas fa-cubes"></i> 应用模板</h1>
    <p>这是一个新应用模板，你可以基于它创建自己的网页应用。</p>
    <p><i class="fas fa-info-circle" style="color:#c9b8ff;"></i> 修改此文件后保存，页面会自动刷新。</p>
    <div style="margin-top:2rem;background:rgba(30,15,70,0.5);padding:1rem;border-radius:8px;border:1px solid #4d3480;">
        <h2><i class="fas fa-cog"></i> 快速提示</h2>
        <ul style="color:#b8a8e6;line-height:1.8;list-style:none;padding-left:0;">
            <li><i class="fas fa-check-circle" style="color:#2e9453;"></i> 应用目录：apps/你的应用名/</li>
            <li><i class="fas fa-check-circle" style="color:#2e9453;"></i> 入口文件：index.html，可配置 app.json</li>
            <li><i class="fas fa-check-circle" style="color:#2e9453;"></i> 使用 Font Awesome 图标：https://fontawesome.com/icons</li>
        </ul>
    </div>
    <script src="script.js"></script>
</body>
</html>
